  <style>
    :root {
      color-scheme: dark;
      --yellow: #f6b800;
      --yellow-light: #ffd84a;
      --panel: rgba(16, 22, 27, 0.90);
      --text: #f7f3e8;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: #87b0c4; color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none; user-select: none;
    }
    canvas { display: block; width: 100%; height: 100%; outline: none; }
    button { color: inherit; font: inherit; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      width: min(340px, calc(100vw - 24px)); padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 14px;
      background: var(--panel); box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px); pointer-events: none;
    }
    #titleRow, #scoreRow, #capacityLabel {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    #gameTitle { color: var(--yellow-light); font-size: 14px; font-weight: 900; letter-spacing: 0.08em; }
    #scoreRow { margin-top: 8px; font-size: 13px; }
    #score { color: #ffe17b; font-size: 22px; font-weight: 900; }
    #capacityLabel { margin-top: 8px; font-size: 12px; }
    #capacityTrack {
      position: relative; height: 18px; margin-top: 5px; overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 999px;
      background: rgba(0, 0, 0, 0.32);
    }
    #capacityFill {
      width: 0%; height: 100%; border-radius: inherit;
      background: linear-gradient(90deg, #8d522a 0%, #b86b31 55%, #e4953e 85%, #ffd66a 100%);
      box-shadow: 0 0 14px rgba(255, 179, 70, 0.65); transition: width 80ms linear;
    }
    #status { min-height: 18px; margin-top: 8px; color: #fff1ba; font-size: 12px; font-weight: 700; }
    #mission { margin-top: 4px; color: rgba(255, 255, 255, 0.72); font-size: 11px; }
    #soundButton, #helpButton, #langButton {
      position: fixed; top: 12px; z-index: 20; width: 44px; height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.22); border-radius: 12px;
      background: var(--panel); cursor: pointer; backdrop-filter: blur(8px);
    }
    #soundButton { right: 112px; }
    #langButton  { right: 64px; z-index: 110; }
    #helpButton { right: 12px; }
    #centerMessage {
      position: fixed; top: 22%; left: 50%; z-index: 12; padding: 10px 18px;
      border-radius: 999px; background: rgba(25, 18, 10, 0.85); color: #ffe39a;
      font-size: clamp(16px, 3vw, 26px); font-weight: 1000; letter-spacing: 0.04em;
      opacity: 0; pointer-events: none;
      transform: translate(-50%, -10px) scale(0.9);
      transition: opacity 180ms ease, transform 220ms cubic-bezier(0.18, 0.9, 0.25, 1.4);
      text-shadow: 0 2px 10px #000;
    }
    #centerMessage.visible { opacity: 1; transform: translate(-50%, 0) scale(1); }
    #controls {
      position: fixed; right: 0; bottom: max(14px, env(safe-area-inset-bottom)); left: 0;
      z-index: 15; display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 max(18px, env(safe-area-inset-left)); pointer-events: none;
    }
    .joystickBlock { display: grid; justify-items: center; gap: 6px; pointer-events: auto; }
    .joystick {
      position: relative; width: clamp(100px, 22vw, 135px); aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.25); border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.10) 0 12%, rgba(7, 12, 15, 0.62) 13% 100%);
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.46), 0 8px 25px rgba(0, 0, 0, 0.28);
    }
    .joystick::before, .joystick::after { absolute: content: ""; background: rgba(255, 255, 255, 0.12); }
    .joystick::before { top: 10%; bottom: 10%; left: calc(50% - 1px); width: 2px; }
    .joystick::after { top: calc(50% - 1px); right: 10%; left: 10%; height: 2px; }
    .knob {
      position: absolute; top: 50%; left: 50%; width: 42%; aspect-ratio: 1;
      border: 2px solid rgba(255, 255, 255, 0.32); border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffd95c, #d88c00 70%);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), inset 0 2px 4px rgba(255, 255, 255, 0.38);
      transform: translate(-50%, -50%);
    }
    .leverHints { display: flex; width: 100%; justify-content: space-between;
      color: rgba(255, 255, 255, 0.88); font-size: 10px; font-weight: 800; text-shadow: 0 1px 3px #000;
    }
    .verticalHint {
      position: absolute; top: 50%; left: 50%; z-index: 2;
      color: rgba(255, 255, 255, 0.72); font-size: 9px; line-height: 1.15;
      text-align: center; pointer-events: none; transform: translate(-50%, -50%);
    }
    /* === 走行用の中央Wスライダー === */
    #trackControls {
      display: flex; gap: 14px; align-items: center; justify-content: center;
      margin-bottom: 6px; pointer-events: auto;
    }
    .trackBox {
      display: flex; flex-direction: column; align-items: center;
      color: rgba(255, 255, 255, 0.82); font-size: 10px; font-weight: 900;
      text-shadow: 0 1px 3px #000;
    }
    .trackBox input[type="range"] {
      writing-mode: vertical-lr; direction: rtl;
      width: 24px; height: clamp(90px, 18vw, 120px); margin-top: 4px;
      cursor: ns-resize; outline: none; background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 6px;
    }
    #startOverlay, #helpOverlay {
      position: fixed; inset: 0; z-index: 100; display: grid; place-items: center;
      padding: 18px;
      background: radial-gradient(circle at center, rgba(33, 51, 58, 0.38), rgba(5, 8, 10, 0.92));
      backdrop-filter: blur(7px);
    }
    #helpOverlay { display: none; z-index: 90; }
    .dialog {
      width: min(590px, 100%); max-height: calc(100vh - 36px); overflow: auto;
      padding: 24px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px;
      background: rgba(19, 24, 27, 0.96); box-shadow: 0 20px 80px rgba(0, 0, 0, 0.6);
    }
    .dialog h1, .dialog h2 { margin: 0 0 10px; color: var(--yellow-light); }
    .dialog p { margin: 7px 0; color: rgba(255, 255, 255, 0.82); line-height: 1.6; font-size: 13px; }
    .dialog strong { color: #ffe59e; }
    .primaryButton {
      width: 100%; margin-top: 18px; padding: 14px 18px; border: 0; border-radius: 12px;
      background: linear-gradient(#ffd13d, #e99b00); color: #241800; font-weight: 1000;
      cursor: pointer; box-shadow: 0 7px 20px rgba(255, 180, 0, 0.25);
    }
    .keys { display: grid; grid-template-columns: auto 1fr; gap: 5px 12px; margin-top: 12px; font-size: 12px; }
    kbd {
      min-width: 62px; padding: 3px 6px; border: 1px solid #666; border-radius: 5px;
      background: #30363a; text-align: center; box-shadow: inset 0 -2px rgba(0, 0, 0, 0.4);
    }
    @media (pointer: fine) and (min-width: 900px) {
      #controls { opacity: 0.90; }
    }
    /* スマホ用：HUD透過 */
    @media (max-width: 600px) {
      #hud {
        width: calc(100vw - 126px);
        padding: 9px 11px;
        opacity: 0.45;
        transition: opacity 0.2s;
      }
      #gameTitle { font-size: 11px; }
      #score { font-size: 18px; }
      #mission { display: none; }
      .dialog { padding: 20px; }
    }
  </style>

            { key: "W / S", desc: "ブーム上げ / 下げ（三菱・コマツパターン）" },

            { key: "I / K", desc: "アーム引き / 押し（三菱・コマツパターン）" },
            { key: "J / L", desc: "バケット巻き / 開き" },
            { key: "矢印キー ↑ ↓ ← →", desc: "キャタピラ自走・スピン旋回" }

          helpP2: "<strong>右レバー：</strong>上下でアーム、左右でバケット [1]。",

          msgStart: "エンジン始動！",
          msgLoad20: "土が溜まってきた！",
          msgLoad60: "こんもり大盛り！",
          msgLoad100: "山盛り満杯！ずっしり重いぞ！",
          msgDeliver: (bonus) => `運搬完了ボーナス！ +${bonus}`,
          statusMoving: "自走レバーで移動。つめを刺し、巻きながら掘ろう",
          statusHauling: (type) => `運搬中: ${type} | 排出エリアへ移動・旋回してください`,
          typeSand: "砂質（サラサラ・こぼれやすい）",
          typeClay: "硬粘土質（激重・落としにくい）",
        },
        en: {
          gameTitle: "Extreme YUMBO EARTHWORKS",
          loadsLabel: "Loads",
          timesLabel: "",
          scoreLabel: "SCORE",
          capacityLabel: "Bucket Fill",
          statusInit: "Engine start – JIS standard levers",
          mission: "Left: Soft sand pile (light, tracks) | Right: Hard clay pile (heavy, dense)",
          leftHint: "Boom<br>↑ ↓",
          rightHint: "Arm<br>↑ ↓",
          leftSwing: "Swing ←",
          rightSwing: "→ Swing",
          curl: "Curl ←",
          dump: "→ Dump",
          leftTrack: "L Track",
          rightTrack: "R Track",
          startTitle: "Extreme YUMBO EARTHWORKS",
          startP1: "A full-scale 3D excavator simulator pursuing professional controls and mechanics.",
          startP2: "<strong>[Latest physics & operation optimizations]</strong>",
          startP3: "・<strong>Independent crawler drive:</strong> Use the two center levers or **arrow keys (↑ ↓ ← →)** for spin turns and forward/reverse travel.",
          startP4: "・<strong>Realistic pitch & roll on slopes:</strong> When climbing dirt piles, the entire body tilts realistically based on ground sampling.",
          startP5: "・<strong>Crawler track marks:</strong> Driving on the soft sand pile (left side) crushes the sand under its own weight, leaving realistic track marks (ruts). The hard clay pile on the right does not deform.",
          startP6: "・<strong>Bun-shaped soil & sliding flow:</strong> Completely eliminates the “rice cake / Swiss roll” look. Beautifully rounded soil mounds slide forward when the bucket tilts, and grains cascade like a waterfall.",
          startP7: "・<strong>Prevention of “ghost penetration”:</strong> Soil can only be scooped when the teeth are lower than the heel (proper digging posture), eliminating material passing through the bucket back.",
          startKeys: [
            { key: "W / S", desc: "Boom raise / lower (Mitsubishi/Komatsu pattern)" },
            { key: "Q / E", desc: "Body left swing / right swing" },
            { key: "I / K", desc: "Arm in / out (Mitsubishi/Komatsu pattern)" },

          ],
          startBtn: "Start Engine (Mitsubishi/Komatsu layout)",
          helpTitle: "Controls & Details",
          helpP1: "<strong>Left lever:</strong> Up/down = boom, left/right = swing [1].",
          helpP2: "<strong>Right lever:</strong> Up/down = arm, left/right = bucket [1].",
          helpP3: "<strong>Center travel levers & arrow keys:</strong> Drive the crawlers. Driving on the left sand pile leaves track marks. The right hard clay pile acts as a sturdy ramp.",

          helpP5: "<strong>Grading:</strong> Pressing the open bucket against the ground while moving the arm flattens the terrain (“back-dragging”). Also, swinging while in contact with the ground performs “swing grading”.",
          helpBtn: "Return to cab",
          msgStart: "Engine started!",
          msgLoad20: "Soil is piling up!",
          msgLoad60: "Heap is getting big!",
          msgLoad100: "Bucket full! Extremely heavy!",
          msgDeliver: (bonus) => `Delivery bonus! +${bonus}`,
          statusMoving: "Use travel levers. Insert teeth, curl bucket to dig.",
          statusHauling: (type) => `Hauling: ${type} | Move to dump zone and turn`,
          typeSand: "Sand (loose, easy to spill)",
          typeClay: "Hard clay (very heavy, hard to dump)",
        }
      };

      let currentLang = 'ja';
      function t(key, ...params) {
        const entry = langRes[currentLang]?.[key] ?? langRes.ja[key];
        if (typeof entry === 'function') return entry(...params);
        return entry ?? key;
      }

      function updateAllTexts() {
        document.getElementById('gameTitle').textContent = t('gameTitle');
        document.getElementById('loadsLabel').textContent = t('loadsLabel');
        document.getElementById('timesLabel').textContent = t('timesLabel');
        document.getElementById('scoreLabel').textContent = t('scoreLabel');
        document.getElementById('capacityText').textContent = t('capacityLabel');
        document.getElementById('mission').textContent = t('mission');
        document.getElementById('leftHint').innerHTML = t('leftHint');
        document.getElementById('rightHint').innerHTML = t('rightHint');
        document.getElementById('leftSwingHint').textContent = t('leftSwing');
        document.getElementById('rightSwingHint').textContent = t('rightSwing');
        document.getElementById('curlHint').textContent = t('curl');
        document.getElementById('dumpHint').textContent = t('dump');
        document.getElementById('leftTrackLabel').textContent = t('leftTrack');
        document.getElementById('rightTrackLabel').textContent = t('rightTrack');

        renderStartOverlay();
        renderHelpOverlay();

        const statusEl = document.getElementById('status');
        if (statusEl.dataset.state !== 'hauling') {
          statusEl.textContent = t('statusMoving');
        }
        document.getElementById('langButton').textContent = currentLang === 'ja' ? '🌐 JA' : '🌐 EN';

        const keysHTML = langRes[currentLang].startKeys.map(k => `<kbd>${k.key}</kbd><span>${k.desc}</span>`).join('');
        document.getElementById('startDialog').innerHTML = `
          <h1>${t('startTitle')}</h1>
          <p>${t('startP1')}</p>
          <p>${t('startP2')}</p>
          <p>${t('startP3')}</p>
          <p>${t('startP4')}</p>
          <p>${t('startP5')}</p>
          <p>${t('startP6')}</p>
          <p>${t('startP7')}</p>
          <div class="keys">${keysHTML}</div>
          <button id="startButton" class="primaryButton">${t('startBtn')}</button>

          gameStarted = true;
          document.getElementById("startOverlay").style.display = "none";
          initAudio();
          showMessage(t('msgStart'), 1.2);
        });

      function renderHelpOverlay() {
        document.getElementById('helpDialog').innerHTML = `
          <h2>${t('helpTitle')}</h2>
          <p>${t('helpP1')}</p>
          <p>${t('helpP2')}</p>
          <p>${t('helpP3')}</p>
          <p>${t('helpP4')}</p>
          <p>${t('helpP5')}</p>
          <button id="closeHelpButton" class="primaryButton">${t('helpBtn')}</button>
        `;
        document.getElementById('closeHelpButton').addEventListener('click', () => {
          document.getElementById('helpOverlay').style.display = 'none';
        });
      }

      document.getElementById('langButton').addEventListener('click', () => {
        currentLang = currentLang === 'ja' ? 'en' : 'ja';
        updateAllTexts();
        document.getElementById('helpButton').onclick = () => {
          document.getElementById('helpOverlay').style.display = 'grid';
        };
        document.getElementById('closeHelpButton').onclick = () => {
          document.getElementById('helpOverlay').style.display = 'none';
        };
      });

      // ---------- 3D & 物理 ----------
      const clamp = THREE.MathUtils.clamp;
      const lerp = THREE.MathUtils.lerp;
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87b0c4);
      scene.fog = new THREE.Fog(0x87b0c4, 20, 50);
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      
      let camYaw = 2.4; 
      let camPitch = 0.42;
      let camDist = 11.2;

      // 縦画面ならカメラを遠くに
      function updateCamDistByOrientation() {
        const aspect = window.innerWidth / window.innerHeight;
        camDist = aspect < 1 ? 16.5 : 11.2;
      }

      const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8));

          const radius = rect.width * 0.32;
          let x = event.clientX - (rect.left + rect.width / 2);
          let y = event.clientY - (rect.top + rect.height / 2);
          const length = Math.hypot(x, y);
          if (length > radius) { x = (x / length) * radius; y = (y / length) * radius; }
          controls[xProperty] = x / radius; controls[yProperty] = y / radius;
          knob.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
        }
        function release(event) {
          if (pointerId !== event.pointerId) return;
          pointerId = null; controls[xProperty] = 0; controls[yProperty] = 0;
          knob.style.transform = "translate(-50%, -50%)"; element.releasePointerCapture?.(event.pointerId);

        element.addEventListener("pointerdown", (event) => { pointerId = event.pointerId; element.setPointerCapture(pointerId); update(event); initAudio(); });

        element.addEventListener("pointerup", release); element.addEventListener("pointercancel", release);

      });
      renderer.domElement.addEventListener("pointermove", (event) => {
        if (!isCamDragging) return;
        const dx = event.clientX - prevCamX, dy = event.clientY - prevCamY;
        prevCamX = event.clientX; prevCamY = event.clientY;
        camYaw -= dx * 0.006;
        camPitch = clamp(camPitch + dy * 0.006, 0.05, 1.4);
      });
      renderer.domElement.addEventListener("pointerup", (event) => {
        isCamDragging = false;
        renderer.domElement.releasePointerCapture(event.pointerId);
      });
      renderer.domElement.addEventListener("pointercancel", () => { isCamDragging = false; });

      const _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3();
      function updateHydraulic(cylinder, rod, anchorBase, anchorTip, baseRad, rodRad) {
        anchorBase.getWorldPosition(_v1);
        anchorTip.getWorldPosition(_v2);
        
        const dist = _v1.distanceTo(_v2);
        if (dist < 0.001) return;
        
        cylinder.position.copy(_v1);
        cylinder.lookAt(_v2);
        cylinder.scale.set(baseRad, baseRad, dist);
        
        rod.position.copy(_v2);
        rod.lookAt(_v1);
        rod.scale.set(rodRad, rodRad, dist * 0.85);
      }

      const d_boomCylBase = new THREE.Object3D(); d_boomCylBase.position.set(0.48, 0.42, 0); upper.add(d_boomCylBase);
      const d_boomCylTip = new THREE.Object3D(); d_boomCylTip.position.set(1.4, 0.28, 0); boom.add(d_boomCylTip);
      const d_armCylBase = new THREE.Object3D(); d_armCylBase.position.set(0.85, 0.38, 0); boom.add(d_armCylBase);
      const d_armCylTip = new THREE.Object3D(); d_armCylTip.position.set(0.3, 0.22, 0); arm.add(d_armCylTip);
      const d_bktCylBase = new THREE.Object3D(); d_bktCylBase.position.set(0.4, 0.28, 0); arm.add(d_bktCylBase);
      const d_bktCylTip = new THREE.Object3D(); d_bktCylTip.position.set(-0.15, 0.38, 0); bucketPivot.add(d_bktCylTip);

      function updateAllHydraulics() {
        updateHydraulic(boomCylBase, boomCylRod, d_boomCylBase, d_boomCylTip, 0.12, 0.08);
        updateHydraulic(armCylBase, armCylRod, d_armCylBase, d_armCylTip, 0.10, 0.065);
        updateHydraulic(bktCylBase, bktCylRod, d_bktCylBase, d_bktCylTip, 0.08, 0.05);
      }

      function getInput() {
        const swingInput = controls.leftX + (keyboard.KeyE ? 1 : 0) - (keyboard.KeyQ ? 1 : 0);
        const boomInput = -controls.leftY + (keyboard.KeyW ? 1 : 0) - (keyboard.KeyS ? 1 : 0);
        const armInput = -controls.rightY + (keyboard.KeyI ? 1 : 0) - (keyboard.KeyK ? 1 : 0);
        const bucketInput = controls.rightX + (keyboard.KeyL ? 1 : 0) - (keyboard.KeyJ ? 1 : 0);

        return {
          swing: clamp(swingInput, -1, 1),
          boom: clamp(boomInput, -1, 1),
          arm: clamp(armInput, -1, 1),
          bucket: clamp(bucketInput, -1, 1)
        };
      }

      const leftTrackSlider = document.getElementById("leftTrackSlider");
      const rightTrackSlider = document.getElementById("rightTrackSlider");

      // ★ 走行レバー操作中はカメラ回転をブロック
      document.getElementById('trackControls').addEventListener('pointerdown', (e) => {
        e.stopPropagation();
      });
      
      function getTrackInputs() {
        let tL = 0.0;
        let tR = 0.0;
        if (keyboard.ArrowUp) { tL = 1.0; tR = 1.0; }
        else if (keyboard.ArrowDown) { tL = -1.0; tR = -1.0; }
        else if (keyboard.ArrowLeft) { tL = -1.0; tR = 1.0; }
        else if (keyboard.ArrowRight) { tL = 1.0; tR = -1.0; }
        else {
          tL = parseFloat(leftTrackSlider.value);
          tR = parseFloat(rightTrackSlider.value);
        }
        return { left: tL, right: tR };
      }

      function getContactPointWorld(lx, lz) {
        const rotY = machineRoot.rotation.y;
        const cos = Math.cos(rotY), sin = Math.sin(rotY);
        const wx = machineRoot.position.x + lx * cos - lz * sin;
        const wz = machineRoot.position.z + lx * sin + lz * cos;
        return { x: wx, z: wz, h: getTerrainHeightAt(wx, wz) };
      }

      const worldTipPos = new THREE.Vector3();
      const worldHeelPos = new THREE.Vector3();
      const machineRoot = excavator;

      machineRoot.position.set(-2.5, 0.0, 0);

      function updateMachine(delta) {
        if (!gameStarted) return;
        const input = getInput();

        tipMarker.getWorldPosition(worldTipPos);
        heelMarker.getWorldPosition(worldHeelPos);

        const currentHardness = getTerrainHardness(worldTipPos.x, worldTipPos.z);
        const groundY = getTerrainHeightAt(worldTipPos.x, worldTipPos.z);
        const depth = groundY - worldTipPos.y;

        const trackInput = getTrackInputs();
        const trackHardness = getTerrainHardness(machineRoot.position.x, machineRoot.position.z);
        const trackSpeedMod = (trackHardness < 0.4) ? 0.62 : 1.0;

        const leftVel = trackInput.left * 1.4 * trackSpeedMod;
        const rightVel = trackInput.right * 1.4 * trackSpeedMod;
        
        const trackDistance = 1.84;
        const v = (leftVel + rightVel) / 2;
        const omega = (leftVel - rightVel) / trackDistance;

        machineRoot.rotation.y += omega * delta;
        const forwardDir = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), machineRoot.rotation.y);
        machineRoot.position.addScaledVector(forwardDir, v * delta);

        const ptFL = getContactPointWorld(1.2, -0.92);
        const ptFR = getContactPointWorld(1.2, 0.92);
        const ptRL = getContactPointWorld(-1.2, -0.92);
        const ptRR = getContactPointWorld(-1.2, 0.92);

        const avgGroundY = (ptFL.h + ptFR.h + ptRL.h + ptRR.h) / 4;
        machineRoot.position.y = lerp(machineRoot.position.y, avgGroundY, 1.0 - Math.exp(-delta * 8.0));

        const pitch = Math.atan2(((ptFL.h + ptFR.h) / 2) - ((ptRL.h + ptRR.h) / 2), 2.4);
        const roll = Math.atan2(((ptFL.h + ptRL.h) / 2) - ((ptFR.h + ptRR.h) / 2), 1.84);

        undercarriage.rotation.z = pitch;
        undercarriage.rotation.x = -roll;

        if (trackHardness < 0.45 && Math.abs(leftVel + rightVel) > 0.1) {
          for (let lx of [-1.2, 0, 1.2]) {
            const pL = getContactPointWorld(lx, -0.92);
            const pR = getContactPointWorld(lx, 0.92);
            
            setTerrainHeightAt(pL.x, pL.z, -0.016 * delta);
            setTerrainHeightAt(pR.x, pR.z, -0.016 * delta);

            const pL_outer = getContactPointWorld(lx, -1.35);
            const pR_outer = getContactPointWorld(lx, 1.35);
            setTerrainHeightAt(pL_outer.x, pL_outer.z, 0.008 * delta);
            setTerrainHeightAt(pR_outer.x, pR_outer.z, 0.008 * delta);
          }
          terrainUpdateFlag = true;
        }

        if (!keyboard.ArrowUp && !keyboard.ArrowDown && !keyboard.ArrowLeft && !keyboard.ArrowRight) {
          leftTrackSlider.value = approach(parseFloat(leftTrackSlider.value), 0.0, delta * 3.5);
          rightTrackSlider.value = approach(parseFloat(rightTrackSlider.value), 0.0, delta * 3.5);
        }

        let resistance = 0.0;
        if (depth > -0.05 && worldTipPos.x > 1.2 && worldTipPos.x < 12.0 && Math.abs(worldTipPos.z) < 4.8) {
          const bktMatrix = bucket.matrixWorld;
          const normalDir = new THREE.Vector3(-1, 0, 0).applyMatrix4(bktMatrix).sub(new THREE.Vector3(0, 0, 0).applyMatrix4(bktMatrix)).normalize();
          const angleToVertical = Math.abs(normalDir.y);
          
          if (currentHardness > 0.4) {
            resistance = clamp(angleToVertical * 1.5 * currentHardness, 0.0, 0.92);
          } else {
            resistance = clamp(angleToVertical * 0.3 * currentHardness, 0.0, 0.3);
          }
        }

        const speedFactor = 1.0 - resistance;

        const activePartCount = particles.filter(p => p.active && p.inBucket).length;
        let totalWeight = 0;
        particles.forEach(p => {
          if (p.active && p.inBucket) {
            totalWeight += (p.hardnessType > 0.5) ? 1.8 : 1.0;
          }
        });
        currentSoilWeight = totalWeight;
        const weightBoomSlower = clamp(1.0 - (totalWeight / 140.0), 0.35, 1.0);

        swing += input.swing * delta * 0.68 * speedFactor;
        boomAngle += input.boom * delta * 0.52 * speedFactor * weightBoomSlower;
        armAngle += input.arm * delta * 0.62 * speedFactor;
        bucketAngle += input.bucket * delta * 1.5 * speedFactor;
        bucketAngle = clamp(bucketAngle, 0.38, 2.75); 

        upper.rotation.y = swing;
        boomPivot.rotation.z = boomAngle;
        armPivot.rotation.z = armAngle;
        bucketPivot.rotation.z = bucketAngle; 

        const reachDist = Math.max(1.0, worldTipPos.x - 0.6);
        const tiltTarget = (totalWeight * 0.00035) * reachDist;
        tiltAngle = lerp(tiltAngle, tiltTarget, 1 - Math.exp(-delta * 3.5));
        upper.rotation.z = tiltAngle;

        const inDiggingArea = worldTipPos.x > 1.2 && worldTipPos.x < 11.8 && Math.abs(worldTipPos.z) < 4.6;
        if (inDiggingArea && depth > -0.08 && depth < 1.4) {
          const isCorrectDiggingAngle = worldTipPos.y < worldHeelPos.y + 0.15;
          const isDiggingAction = isCorrectDiggingAngle && (input.bucket < -0.1 || (input.arm > 0.15 && bucketAngle < 1.8));
          if (isDiggingAction && resistance < 0.85) {
            const digPower = -delta * (0.35 + Math.max(0, input.arm) * 0.4) * (1.0 - resistance * 0.5);
            applyDeformationRadius(worldTipPos.x, worldTipPos.z, 0.5, digPower, "dig");

            const maxSpawn = (currentHardness > 0.4) ? 2 : 3;
            let spawned = 0;
            for (let i = 0; i < maxParticles; i++) {
              if (spawned >= maxSpawn) break;
              const p = particles[i];
              if (!p.active) {
                p.active = true;
                p.inBucket = true;
                p.hardnessType = currentHardness;
                p.localPos.set(
                  -Math.random() * 0.5,
                  -0.28 + Math.random() * 0.4,
                  (Math.random() - 0.5) * 0.8
                );
                p.localVel.set(0, 0, 0);
                p.life = 1.0;
                p.scale = 0.5 + Math.random() * 0.6;
                const color = colSand.clone().lerp(colClay, p.hardnessType);
                instancedParticles.setColorAt(i, color);
                spawned++;
              }
            }
            if (spawned > 0) {
              if (instancedParticles.instanceColor) instancedParticles.instanceColor.needsUpdate = true;
              playNoise(0.08, 0.02);
              spawnDust(worldTipPos, 1);
            }
          }
        }

        heelMarker.getWorldPosition(worldHeelPos);
        const heelGroundY = getTerrainHeightAt(worldHeelPos.x, worldHeelPos.z);
        if (worldHeelPos.y <= heelGroundY + 0.15 && worldHeelPos.x > 1.2 && worldHeelPos.x < 11.8 && Math.abs(worldHeelPos.z) < 4.6) {
          const isPressing = input.boom < -0.2 || input.arm < -0.2;
          if (isPressing) {
            applyDeformationRadius(worldHeelPos.x, worldHeelPos.z, 0.7, worldHeelPos.y - 0.05, "flatten");
            if (Math.random() < 0.15) {
              spawnDust(worldHeelPos, 1);
              playNoise(0.06, 0.015);
            }
          }
        }

        const swingSpeed = Math.abs(input.swing);
        if (swingSpeed > 0.1 && worldTipPos.y <= groundY + 0.25 && inDiggingArea) {
          applyDeformationRadius(worldTipPos.x, worldTipPos.z, 0.8, worldTipPos.y - 0.02, "flatten");
          if (Math.random() < 0.2) {
            spawnDust(worldTipPos, 1);
            playNoise(0.05, 0.01);
          }
        }

        if (activePartCount === 0) {
          statusElement.textContent = t('statusMoving');
          statusElement.dataset.state = 'idle';
        } else {
          const typeStr = (currentHardness > 0.5) ? t('typeClay') : t('typeSand');
          statusElement.textContent = t('statusHauling', typeStr);
          statusElement.dataset.state = 'hauling';
        }
      }

      function approach(v, t, a) { return v < t ? Math.min(v + a, t) : v > t ? Math.max(v - a, t) : v; }

      const _matB = new THREE.Matrix4();
      const _invMatB = new THREE.Matrix4();
      const _worldP = new THREE.Vector3();
      const _worldV = new THREE.Vector3();
      const _localG = new THREE.Vector3();
      const _quatB = new THREE.Quaternion();

      function updateParticlesPhysics(delta) {
        _matB.copy(bucket.matrixWorld);
        _invMatB.copy(_matB).invert();
        bucket.getWorldQuaternion(_quatB);

        _localG.set(0, -9.8, 0).applyQuaternion(_quatB.clone().invert());

        for (let i = 0; i < maxParticles; i++) {
          const p = particles[i];
          if (!p.active) {
            const dummy = new THREE.Object3D();
            dummy.scale.set(0, 0, 0);
            dummy.updateMatrix();
            instancedParticles.setMatrixAt(i, dummy.matrix);
            continue;
          }

          if (p.inBucket) {
            p.localVel.addScaledVector(_localG, delta);
            p.localVel.multiplyScalar(0.85); 
            p.localPos.addScaledVector(p.localVel, delta);

            if (p.localPos.y < -0.34) {
              p.localPos.y = -0.34;
              p.localVel.y = -p.localVel.y * 0.15;
              p.localVel.x *= 0.8; p.localVel.z *= 0.8;
            }
            if (p.localPos.x > 0.04) {
              p.localPos.x = 0.04;
              p.localVel.x = -p.localVel.x * 0.15;
              p.localVel.y *= 0.8; p.localVel.z *= 0.8;
            }
            if (p.localPos.z < -0.62) { p.localPos.z = -0.62; p.localVel.z = -p.localVel.z * 0.15; }
            if (p.localPos.z > 0.52) { p.localPos.z = 0.52; p.localVel.z = -p.localVel.z * 0.15; }

            if (p.localPos.y < -0.22) {
              p.localVel.x += (Math.random() - 0.5) * 0.04;
            }

            const spillThreshold = (p.hardnessType > 0.5) ? -1.22 : -1.15;
            if (p.localPos.x < spillThreshold) {
              p.inBucket = false;
              _worldP.copy(p.localPos).applyMatrix4(_matB);
              p.pos.copy(_worldP);
              _worldV.copy(p.localVel).applyQuaternion(_quatB);
              p.vel.copy(_worldV);
              p.vel.x += (Math.random() - 0.5) * 0.4;
              p.vel.z += (Math.random() - 0.5) * 0.4;
            }

            const dummy = new THREE.Object3D();
            dummy.position.copy(p.localPos);
            dummy.scale.setScalar(p.scale);
            dummy.updateMatrix();
            dummy.matrix.premultiply(_matB);
            instancedParticles.setMatrixAt(i, dummy.matrix);

          } else {
            p.vel.y -= 9.8 * delta;
            p.pos.addScaledVector(p.vel, delta);

            const groundY = getTerrainHeightAt(p.pos.x, p.pos.z);

            if (p.pos.y <= groundY + 0.05) {
              p.pos.y = groundY + 0.02;
              p.active = false;

              const distToDump = Math.hypot(p.pos.x - dumpCenter.x, p.pos.z - dumpCenter.z);
              if (distToDump < 1.85) {
                totalDeliveredParticles++;
                const bonus = (p.hardnessType > 0.5) ? 14 : 8;
                score += bonus;
                
                const dumpScale = clamp(totalDeliveredParticles / 110.0, 0.1, 2.8);
                dumpPile.scale.set(0.1 + dumpScale * 0.8, 0.05 + dumpScale * 0.7, 0.1 + dumpScale * 0.8);
                dumpPile.position.y = 0.03 + dumpPile.scale.y * 0.58;
              }
            }

            const dummy = new THREE.Object3D();
            dummy.position.copy(p.pos);
            dummy.scale.setScalar(p.scale);
            dummy.updateMatrix();
            instancedParticles.setMatrixAt(i, dummy.matrix);
          }
        }
        instancedParticles.instanceMatrix.needsUpdate = true;
      }

      function updateDustParticles(delta) {
        for (let i = dustParticles.length - 1; i >= 0; i--) {
          const d = dustParticles[i];
          d.life -= delta;
          d.sprite.position.addScaledVector(d.vel, delta);
          d.sprite.scale.multiplyScalar(1 + delta * 1.05);
          d.sprite.material.opacity = clamp(d.life * 0.55, 0, 0.55);

          if (d.life <= 0) {
            scene.remove(d.sprite);
            d.sprite.material.dispose();
            dustParticles.splice(i, 1);
          }
        }
      }

      let terrainCooldown = 0.0;
      function flushTerrainMesh(delta) {
        if (!terrainUpdateFlag) return;
        terrainCooldown -= delta;
        if (terrainCooldown > 0) return;
        terrainCooldown = 0.08;

        terrainGeometry.computeVertexNormals();
        terrainPositions.needsUpdate = true;
        terrainGeometry.attributes.normal.needsUpdate = true;
        terrainUpdateFlag = false;
      }

      function updateCamera(delta) {
        updateCamDistByOrientation();
        const upperWorld = new THREE.Vector3(); upper.getWorldPosition(upperWorld);
        
        const targetX = upperWorld.x;
        const targetY = upperWorld.y + 0.6;
        const targetZ = upperWorld.z;

        camera.position.x = targetX + Math.cos(camYaw) * Math.cos(camPitch) * camDist;
        camera.position.y = targetY + Math.sin(camPitch) * camDist;
        camera.position.z = targetZ + Math.sin(camYaw) * Math.cos(camPitch) * camDist;

        camera.lookAt(targetX, targetY, targetZ);
      }

      let lastActiveCount = 0;
      function updateHudAndMilestones(delta) {
        scoreElement.textContent = Math.floor(score).toLocaleString();
        loadsElement.textContent = loads.toString();

        const activePartCount = particles.filter(p => p.active && p.inBucket).length;
        const capacityPct = Math.round((activePartCount / maxParticles) * 100);
        capacityFill.style.width = `${capacityPct}%`;
        document.getElementById("capacityPct").textContent = `${capacityPct}%`;

        if (capacityPct > 1) {
          bucketSoilMesh.visible = true;
          const baseRatio = capacityPct / 100.0;
          const scaleX = 0.65 + baseRatio * 0.35;
          const scaleY = 0.38 + baseRatio * 0.62;
          bucketSoilMesh.scale.set(scaleX, scaleY, 0.96);

          if (bucketAngle > 1.25) {
            const slideRatio = (bucketAngle - 1.25) / 1.5;
            bucketSoilMesh.position.x = -0.52 - slideRatio * 0.38;
            bucketSoilMesh.scale.y *= (1.0 - slideRatio * 0.88);
          } else {
            bucketSoilMesh.position.x = -0.52;
          }
        } else {
          bucketSoilMesh.visible = false;
        }

        if (activePartCount > lastActiveCount) {
          if (activePartCount === 20) showMessage(t('msgLoad20'));
          if (activePartCount === 60) showMessage(t('msgLoad60'));
          if (activePartCount === 100) {
            showMessage(t('msgLoad100'), 1.8);
            playNoise(0.15, 0.08);
          }
        }

        if (lastActiveCount >= 20 && activePartCount === 0) {
          loads++;
          const scoreBonus = lastActiveCount * 4 + 100;
          score += scoreBonus;
          showMessage(t('msgDeliver', scoreBonus), 1.6);
        }

        lastActiveCount = activePartCount;

        if (messageTimer > 0) {
          messageTimer -= delta;
          if (messageTimer <= 0) centerMessage.classList.remove("visible");
        }
      }

      updateAllTexts();

      document.getElementById("startButton").addEventListener("click", () => {
        gameStarted = true;
        document.getElementById("startOverlay").style.display = "none";
        initAudio();
        showMessage(t('msgStart'), 1.2);
      });

      document.getElementById("soundButton").addEventListener("click", () => {
        soundEnabled = !soundEnabled;
        document.getElementById("soundButton").textContent = soundEnabled ? "🔊" : "🔇";
        if (engineGain && audioCtx) {
          engineGain.gain.setTargetAtTime(soundEnabled ? 0.038 : 0, audioCtx.currentTime, 0.05);
        }
        if (soundEnabled) initAudio();
      });

      document.getElementById("helpButton").addEventListener("click", () => {
        document.getElementById("helpOverlay").style.display = "grid";
      });

      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const delta = Math.min(clock.getDelta(), 0.033);

        updateMachine(delta);
        updateAllHydraulics();
        updateParticlesPhysics(delta);
        updateDustParticles(delta);
        flushTerrainMesh(delta);
        updateCamera(delta);
        updateHudAndMilestones(delta);

        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        updateCamDistByOrientation();
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.8)); renderer.setSize(window.innerWidth, window.innerHeight);
      });

      scene.updateMatrixWorld(true);

      upper.rotation.y = swing;
      boomPivot.rotation.z = boomAngle;
      armPivot.rotation.z = armAngle;
      bucketPivot.rotation.z = bucketAngle; 
      updateAllHydraulics();

      animate();
    })();
  </script>
</body>
</html>
